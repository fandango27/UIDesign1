<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>시계?</title>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    html {
      font-size: 16px;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 1rem;
      line-height: 1.5;
      font-variant-numeric: tabular-nums;
      color: white;
      background: black;
    }

    #clock {
      max-width: 40rem;
      width: 100%;
      height: 2rem;
      border: 1px solid lime;
    }
  </style>
</head>
<body>
  <div id="clock"></div>

  <script>
    const clock = document.querySelector("#clock")

    function updateClock() {
      const now = new Date()
      const seconds = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds()
      const percent = seconds / 864

      clock.style.background = "linear-gradient(to right, lime " + percent + "%, black " + percent + "%)"
    }

    updateClock()
    setInterval(updateClock, 1000)
  </script>
</body>
</html>
