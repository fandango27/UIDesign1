<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>시계?</title>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    html {
      font-size: 16px;
    }

    body {
      position: relative;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 1rem;
      line-height: 1.5;
      font-variant-numeric: tabular-nums;
      color: white;
      background: black;
    }

    #clock {
      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      transform: translate(-50%, -50%);
      max-width: 6rem;
      width: 100%;
      max-height: 6rem;
      height: 100%;
      color: black;
      background: white;
      border-radius: 50%;
      transition: left .5s ease, top .5s ease;
    }
  </style>
</head>
<body>
  <div id="clock"></div>

  <script>
    const clock = document.querySelector("#clock")

    function updateClock() {
      const now = new Date()
      const x = 5 + now.getSeconds() * 90 / 59
      const y = 5 + now.getMinutes() * 90 / 59

      clock.style.left = x + "%"
      clock.style.top = y + "%"
      clock.textContent = now.getSeconds()
    }

    updateClock()
    setInterval(updateClock, 1000)
  </script>
</body>
</html>
