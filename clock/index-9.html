<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>시계?</title>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    html {
      font-size: 16px;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 1rem;
      line-height: 1.5;
      font-variant-numeric: tabular-nums;
      color: white;
      background: black;
    }

    #clock {
      font-size: 6vw;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="clock"></div>

  <script>
    const clock = document.querySelector("#clock")

    function bar(value, max) {
      const filled = Math.round(value * 20 / max)
      return "#".repeat(filled) + "-".repeat(20 - filled)
    }

    function updateClock() {
      const now = new Date()

      clock.textContent = bar(now.getHours(), 23) + "\n"
        + bar(now.getMinutes(), 59) + "\n"
        + bar(now.getSeconds(), 59)
    }

    updateClock()
    setInterval(updateClock, 1000)
  </script>
</body>
</html>
